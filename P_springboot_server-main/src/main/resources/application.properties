spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
server.address=0.0.0.0
smartparking.naver-map.client-id=${SMARTPARKING_NAVER_MAP_CLIENT_ID:}
smartparking.campus.name=${SMARTPARKING_CAMPUS_NAME:Gachon University Global Campus}
smartparking.campus.center-lat=${SMARTPARKING_CAMPUS_CENTER_LAT:37.4509}
smartparking.campus.center-lng=${SMARTPARKING_CAMPUS_CENTER_LNG:127.1287}
smartparking.campus.default-zoom=${SMARTPARKING_CAMPUS_DEFAULT_ZOOM:16}
