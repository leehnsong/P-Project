spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
server.address=0.0.0.0
smartparking.yolo.base-url=http://localhost:8000
smartparking.naver-map.client-id=${SMARTPARKING_NAVER_MAP_CLIENT_ID:}
smartparking.jwt.secret=${SMARTPARKING_JWT_SECRET:smartparking-dev-secret-smartparking-dev-secret}
smartparking.jwt.expiration-ms=${SMARTPARKING_JWT_EXPIRATION_MS:3600000}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
